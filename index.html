    // 기본 초기 화면에 노출할 고품격 리포트 예시
    const defaultReportText = `줄서는 구미호 로컬 노출 진단 및 콘텐츠 마케팅 전략 미리보기 리포트

진단 대상 매장: 구미호 베이커리 (예시 매장)
희망 노출 키워드: 구리 소금빵 맛집, 다산동 감성 카페

1. 매장 현재 상황의 날카로운 분석과 진단
매장의 고유 강점과 뛰어난 메뉴 경쟁력이 네이버 플레이스 및 인스타그램 검색 결과에 입체적으로 녹아들지 못하고 단순 정보 전달 형식으로 방치되어 있습니다.

2. 네이버 플레이스 및 지도 검색 노출을 위한 핵심 개선 포인트
구리 소금빵 맛집 및 다산동 감성 카페 키워드가 스마트 플레이스 상세 소개와 대표 키워드에 자연스러운 스토리텔링과 함께 연동되어야 합니다. 스마트콜 수신률과 네이버 예약 기능을 적극 연동하여 플레이스 가산점 알고리즘 점수를 극대화할 시점입니다.

3. 당장 실행 가능한 줄서는 구미호식 로컬 콘텐츠 기획 아이디어
첫째, 김이 모락모락 피어오르는 오븐 속 소금빵을 7초 분량의 임팩트 있는 클로즈업 ASMR 릴스로 제작하여 구리 남양주 타겟 알고리즘에 올립니다.
둘째, 구리 갈매 다산 별내 등 경기 동북권 핵심 소비 거점의 주요 동선별 플레이스 블로그 맘카페 리뷰 크루를 긴밀히 매칭합니다.
셋째, 사장님의 재료 선택 고집과 탄생 스토리를 담은 진정성 있는 브랜드 카드뉴스를 블로그 메인 공지글에 배치합니다.

4. 사장님께 드리는 로컬 브랜딩 응원 메시지
우리 가게의 뛰어난 강점이 제대로 된 콘텐츠라는 옷을 입을 때, 소비자는 기꺼이 줄을 서는 단골손님이 됩니다. 지금 바로 왼쪽 양식을 채워 사장님 매장만을 위한 특별한 리포트를 완성해 보세요.`;

    // 이미지 로딩 실패 시 사용되는 우아한 심볼형 대체 컴포넌트
    function Logo({ className = "w-10 h-10" }) {
      const [imgFailed, setImgFailed] = useState(false);
      
      if (imgFailed) {
        return (
          <div className={`${className} bg-[#0B132B] rounded-full flex items-center justify-center border border-orange-500/30 font-bold text-white text-[10px]`}>
            🦊
          </div>
        );
      }
      return (
        <img 
          src="줄서는구미호(배경제거).jpg" 
          alt="줄서는 구미호 로고" 
          className={`${className} object-cover rounded-full border border-orange-200`}
          onError={(e) => {
            // 확장자가 다를 때 유연한 대처를 위한 로직
            if (e.target.src.endsWith('.jpg')) {
              e.target.src = '줄서는구미호(배경제거).png';
            } else {
              setImgFailed(true);
            }
          }}
        />
      );
    }

    // 브랜드 스토리 영역의 큰 이미지 박스 예외 처리 컴포넌트
    function BigLogo() {
      const [imgFailed, setImgFailed] = useState(false);
      
      if (imgFailed) {
        return (
          <div className="w-24 h-24 mx-auto mb-6 bg-[#0B132B] rounded-3xl flex flex-col items-center justify-center border border-orange-500/30 p-2 text-white">
            <span className="text-2xl mb-1">🦊</span>
            <span className="text-[9px] tracking-tight font-bold text-orange-400">GUMIHO</span>
          </div>
        );
      }
      return (
        <div className="w-24 h-24 mx-auto mb-6 bg-slate-900 rounded-3xl flex items-center justify-center border border-orange-500/30 overflow-hidden">
          <img 
            src="줄서는구미호(배경제거).jpg" 
            alt="구미호 브랜드 캐릭터" 
            className="w-full h-full object-cover"
            onError={(e) => {
              if (e.target.src.endsWith('.jpg')) {
                e.target.src = '줄서는구미호(배경제거).png';
              } else {
                setImgFailed(true);
              }
            }}
          />
        </div>
      );
    }

    function App() {
      // API 통신을 위한 상태 관리
      const apiKey = "";
      
      // 사용자 입력 상태
      const [formData, setFormData] = useState({
        storeName: "",
        desiredKeyword: "",
        isAgency: false,
        phone: "",
        region: "구리시",
        regionDetail: "",
        storeType: "식당",
        storeTypeDetail: "",
        marketingBudget: "월 50만원 미만",
        currentIssues: "",
        email: "",
        termsAgreed: false
      });

      // 리포트 결과 상태
      const [isLoadingReport, setIsLoadingReport] = useState(false);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [reportResult, setReportResult] = useState(defaultReportText);
      const [diagnosticProgress, setDiagnosticProgress] = useState("");

      // 네비게이션 스크롤 효과용
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          if (window.scrollY > 50) {
            setIsScrolled(true);
          } else {
            setIsScrolled(false);
          }
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // 모달 알림창 구현
      const [modalMessage, setModalMessage] = useState(null);
      const showModal = (message) => {
        setModalMessage(message);
      };

      // API 호출 함수
      const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(resolve => setTimeout(resolve, delay));
            return fetchWithRetry(url, options, retries - 1, delay * 2);
          }
          throw error;
        }
      };

      // 분석 리포트 생성 및 알림 발송 처리
      const handleGenerateReport = async (e) => {
        e.preventDefault();

        if (!formData.storeName.trim()) {
          showModal("매장명을 입력해 주세요");
          return;
        }
        if (!formData.desiredKeyword.trim()) {
          showModal("희망 노출 키워드를 입력해 주세요");
          return;
        }
        if (!formData.phone.trim()) {
          showModal("전화번호를 입력해 주세요");
          return;
        }
        if (!formData.email.trim()) {
          showModal("이메일을 입력해 주세요");
          return;
        }
        if (!formData.termsAgreed) {
          showModal("개인정보 수집 및 이용에 동의해 주세요");
          return;
        }

        setIsLoadingReport(true);
        setDiagnosticProgress("매장 데이터 및 지역 검색 현황 정밀 조사 중...");

        try {
          await fetch("https://formsubmit.co/ajax/gumiholab@gmail.com", {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              "신청 정보 종류": "줄서는 구미호 무료 노출 진단 신청서",
              "신청 매장 이름": formData.storeName,
              "대행사 여부": formData.isAgency ? "마케터 대리 신청" : "본사 사장님 직접 신청",
              "희망 노출 키워드": formData.desiredKeyword,
              "기본 업종 분류": `${formData.storeType} (${formData.storeTypeDetail})`,
              "매장 주소": `경기도 ${formData.region} ${formData.regionDetail}`,
              "대표 연락처": formData.phone,
              "답변 회신 메일": formData.email,
              "지출 희망 예산": formData.marketingBudget,
              "현재 마케팅 고민": formData.currentIssues
            })
          });

          setIsSubmitted(true);
          setIsLoadingReport(false);
          showModal("정밀진단 신청이 성공적으로 완료되었습니다. 1일 이내에 기재해 주신 이메일 및 담당자가 전화로 상세한 진단 내용을 직접 친절하게 설명해 드립니다.");

        } catch (err) {
          console.warn("데이터 수집 엔진 일시 지연", err);
          setIsSubmitted(true);
          setIsLoadingReport(false);
          showModal("정밀진단 신청이 성공적으로 완료되었습니다. 1일 이내에 기재해 주신 이메일 및 담당자가 전화로 상세한 진단 내용을 직접 친절하게 설명해 드립니다.");
        }

        (async () => {
          const systemInstruction = `
            당신은 로컬 브랜딩 전문가 집단인 '줄서는 구미호'의 수석 컨설턴트입니다.

            모든 제목과 소제목은 절대 특수기호(*, -, #, [], ✨, ★, ! 등)를 사용하지 마십시오. 단정하고 기품 있는 텍스트로만 제목을 표기하세요.

            매장명: ${formData.storeName} ${formData.isAgency ? '(대행사 문의)' : ''}
            희망 노출 키워드: ${formData.desiredKeyword}

            현재 마케팅 예산: ${formData.marketingBudget}
            가장 큰 마케팅 고민: ${formData.currentIssues}
            신청자 이메일: ${formData.email}

            위 정보를 바탕으로 아래 구조의 전문적인 진단 보고서를 한국어로 작성해주세요.
            1. 매장 현재 상황의 날카로운 분석과 진단
            2. 네이버 플레이스 및 지도 검색 노출을 위한 핵심 개선 포인트

            4. 사장님께 드리는 로컬 브랜딩 응원 메시지
          `;

          const payload = {
            contents: [{ parts: [{ text: userQuery }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] }
          };

          try {
            const result = await fetchWithRetry(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              }
            );

            const generatedText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (generatedText) {
              setReportResult(generatedText);
            }
          } catch (error) {
            console.warn("AI 엔진 백그라운드 매칭 생략");

                      포털 지도 서비스에 가게 이름을 쳐도 상위에 전혀 노출이 되지 않고, 유입 소식이나 최신 상세 메뉴 업데이트 관리가 아예 멈춰 있습니다.
                    </p>
                  </div>
                </div>

                {/* 고민 5 */}
                <div className="bg-[#FAF9F6] p-6 rounded-2xl border border-orange-50 hover:border-orange-200 transition-all group hover:-translate-y-1 flex flex-col justify-between">
                  <div>
                    <div className="bg-white p-3 rounded-xl shadow-sm w-fit group-hover:bg-[#F97316] transition-colors mb-4">
                      <Icon name="frown" className="w-6 h-6 text-[#F97316] group-hover:text-white" />
                    </div>
                    <span className="text-xs font-bold text-orange-600">체크 항목 05</span>
                    <h3 className="text-lg font-bold text-slate-800 mt-1 mb-2">체험단 진행 대비 실속 부재</h3>
                    <p className="text-xs text-slate-500 leading-relaxed">
                      남들 다 하길래 비싼 금액을 주며 모집 체험단을 불러 써봤지만 일시적인 조회수에 그쳤을 뿐, 매출이나 단골 증대로는 연결되지 않았습니다.
                    </p>
                  </div>
                </div>

                {/* 고민 6 */}
                <div className="bg-[#FAF9F6] p-6 rounded-2xl border border-orange-50 hover:border-orange-200 transition-all group hover:-translate-y-1 flex flex-col justify-between">
                  <div>
                    <div className="bg-white p-3 rounded-xl shadow-sm w-fit group-hover:bg-[#F97316] transition-colors mb-4">
                      <Icon name="sparkles" className="w-6 h-6 text-[#F97316] group-hover:text-white" />
                    </div>
                    <span className="text-xs font-bold text-orange-600">체크 항목 06</span>
                    <h3 className="text-lg font-bold text-slate-800 mt-1 mb-2">매장 핵심 강점의 연출 불가</h3>
                    <p className="text-xs text-slate-500 leading-relaxed">
                      음식 맛, 차별성, 청결, 분위기 등은 정말 누구보다 자신 있고 훌륭한데 이를 소비자 마음에 확 와닿게 표현하고 자랑할 비책이 도통 안 섭니다.
                    </p>
                  </div>
                </div>

              </div>
            </div>
          </section>

          {/* 3. 무료 분석 신청 및 AI 연동 실시간 리포트 진단 */}
          <section id="apply" className="py-20 px-4 bg-[#FAF9F6] relative border-t border-slate-100">
            <div className="max-w-6xl mx-auto">
              
              <div className="text-center mb-12">
                <span className="text-[#F97316] font-bold text-sm tracking-wider uppercase">원클릭 정밀 맞춤 분석</span>
                <h2 className="text-3xl md:text-4xl font-bold text-[#0B132B] mt-2 mb-4">
                  무료 노출 진단 보고서 및 리포트 신청하기
                </h2>
                <p className="text-slate-500">원하는 노출 키워드를 함께 알려주시면 더욱 정확한 솔루션을 세워드립니다</p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                {/* 좌측: 신청 양식 폼 */}
                <div className="lg:col-span-6 bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                  <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center space-x-2">
                    <Icon name="file-text" className="text-[#F97316] w-5 h-5" />
                    <span>진단 신청서 정보 기재</span>
                  </h3>

                  <form onSubmit={handleGenerateReport} className="space-y-5">
                    
                    {/* 매장명 & 희망 노출 키워드 */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">
                          매장명 또는 브랜드명 <span className="text-red-500 text-xs font-normal">(필수)</span>
                        </label>
                        <input 
                          type="text"
                          placeholder="예) 구미호 소금빵베이커리"
                          value={formData.storeName}
                          onChange={(e) => setFormData({...formData, storeName: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316] transition-all"
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">
                          희망 노출 키워드 <span className="text-red-500 text-xs font-normal">(필수)</span>
                        </label>
                        <input 
                          type="text"
                          placeholder="예) 구리 소금빵 맛집"
                          value={formData.desiredKeyword}
                          onChange={(e) => setFormData({...formData, desiredKeyword: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316] transition-all"
                        />
                      </div>
                    </div>

                    <div className="mt-1">
                      <label className="inline-flex items-center cursor-pointer">
                        <input 
                          type="checkbox"
                          checked={formData.isAgency}
                          onChange={(e) => setFormData({...formData, isAgency: e.target.checked})}
                          className="rounded border-slate-300 text-[#F97316] focus:ring-[#F97316] h-4 w-4"
                        />
                        <span className="text-xs text-slate-500 ml-2">대행사 혹은 마케터 대리 요청 시 체크해 주세요</span>
                      </label>
                    </div>

                    {/* 업종 종류 */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">업종 대분류</label>
                        <select 
                          value={formData.storeType}
                          onChange={(e) => setFormData({...formData, storeType: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316]"
                        >
                          <option value="식당">식당 및 요식업</option>
                          <option value="카페">카페 및 디저트</option>
                          <option value="학원">학원 및 교육 서비스</option>
                          <option value="뷰티">뷰티, 네일, 미용실</option>
                          <option value="체육">체육 시설 및 헬스장</option>
                          <option value="병원">의원 및 메디컬</option>
                          <option value="기타">기타 소상공인 공간</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">상세 품목</label>
                        <input 
                          type="text"
                          placeholder="예) 천연 발효 베이커리, 브런치 카페"
                          value={formData.storeTypeDetail}
                          onChange={(e) => setFormData({...formData, storeTypeDetail: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316]"
                        />
                      </div>
                    </div>

                    {/* 지역 정보 */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">거점 지역</label>
                        <select 
                          value={formData.region}
                          onChange={(e) => setFormData({...formData, region: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316]"
                        >
                          <option value="구리시">경기도 구리시</option>
                          <option value="남양주시">경기도 남양주시</option>
                          <option value="타지역">기타 인근 경기권역</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">상세 지번/동</label>
                        <input 
                          type="text"
                          placeholder="예) 수택동, 다산동"
                          value={formData.regionDetail}
                          onChange={(e) => setFormData({...formData, regionDetail: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316]"
                        />
                      </div>
                    </div>

                    {/* 전화번호 및 이메일 */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">
                          전화번호 <span className="text-red-500 text-xs font-normal">(필수)</span>
                        </label>
                        <input 
                          type="tel"
                          placeholder="숫자만 입력"
                          value={formData.phone}
                          onChange={(e) => setFormData({...formData, phone: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316]"
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-1.5">
                          리포트 전송 이메일 <span className="text-red-500 text-xs font-normal">(필수)</span>
                        </label>
                        <input 
                          type="email"
                          placeholder="이메일 주소 기재"
                          value={formData.email}
                          onChange={(e) => setFormData({...formData, email: e.target.value})}
                          className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316]"
                        />
                      </div>
                    </div>

                    {/* 월 마케팅 지출 예산 */}
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1.5">현재 지출 가능한 대략적 예산</label>
                      <div className="grid grid-cols-2 gap-2">
                        {["월 10만원 미만", "월 10만원 이상 50만원 미만", "월 50만원 이상 100만원 미만", "월 100만원 이상"].map((budgetOpt) => (
                          <button
                            key={budgetOpt}
                            type="button"
                            onClick={() => setFormData({...formData, marketingBudget: budgetOpt})}
                            className={`p-3 rounded-xl text-xs font-semibold text-center border transition-all ${formData.marketingBudget === budgetOpt ? 'bg-[#0B132B] text-white border-[#0B132B]' : 'bg-white text-slate-600 border-slate-200 hover:border-orange-300'}`}
                          >
                            {budgetOpt}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* 상세 고민 내용 */}
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1.5">가장 막막한 현재 마케팅 애로사항</label>
                      <textarea 
                        rows="3"
                        placeholder="예) 가게는 정말 맛있고 자신 있는데 홍보 방법을 전혀 모르겠고, 플레이스 관리도 어떻게 꾸준히 할지 고민입니다."
                        value={formData.currentIssues}
                        onChange={(e) => setFormData({...formData, currentIssues: e.target.value})}
                        className="w-full bg-[#FAF9F6] border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#F97316] resize-none"
                      ></textarea>
                    </div>

                    {/* 개인정보 조항 동의 */}
                    <div className="bg-white p-4 rounded-xl border border-slate-200 text-xs text-slate-500">
                      <div className="flex items-start">
                        <input 
                          type="checkbox"
                          id="terms"
                          checked={formData.termsAgreed}
                          onChange={(e) => setFormData({...formData, termsAgreed: e.target.checked})}
                          className="mt-0.5 rounded border-slate-300 text-[#F97316] focus:ring-[#F97316] h-4 w-4"
                        />
                        <label htmlFor="terms" className="ml-2 leading-relaxed cursor-pointer select-none">
                          <strong className="text-slate-700">필수 개인정보 수집 및 이용 동의</strong><br />
                          수집 목적: 로컬 매장 마케팅 무료 진단 및 진단서 메일 발송, 맞춤 마케팅 상품 및 이벤트 안내. 보유 및 이용 기간: 수집일로부터 1년 또는 회원 해지 요청 시까지.
                        </label>
                      </div>
                    </div>

                    {/* 제출 버튼 */}
                    <button
                      type="submit"
                      disabled={isLoadingReport}
                      className={`w-full bg-[#F97316] text-white py-4 rounded-2xl font-bold text-base hover:bg-[#EA580C] hover:scale-[1.01] transition-all shadow-lg shadow-orange-500/20 flex items-center justify-center space-x-2 ${isLoadingReport ? 'opacity-70 cursor-not-allowed' : ''}`}
                    >
                      {isLoadingReport ? (
                        <>
                          <div className="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div>
                          <span>AI 밀착 진단 진행 중...</span>
                        </>
                      ) : (
                        <>
                          <Icon name="check-circle" className="w-5 h-5" />
                          <span>무료 마케팅 정밀 진단 신청하기</span>
                        </>
                      )}
                    </button>

                  </form>
                </div>

                {/* 우측: 신청 결과 리포트 출력 패널 및 접수 완료 분기 화면 */}
                <div className="lg:col-span-6 flex flex-col space-y-6">
                  
                  {/* 로딩 인디케이터 */}
                  {isLoadingReport && (
                    <div className="bg-gradient-to-r from-orange-500 to-amber-500 p-8 rounded-3xl text-white shadow-lg text-center animate-pulse flex flex-col items-center justify-center space-y-4">
                      <Icon name="compass" className="w-12 h-12 animate-spin text-white" />
                      <h4 className="text-xl font-bold">줄서는 구미호 AI 엔진 가동 중</h4>
                      <p className="text-sm text-orange-50/90 leading-relaxed font-light">
                        {diagnosticProgress}
                      </p>
                    </div>
                  )}

                  {/* 정밀 진단 접수 완료 분기 및 리포트 결과 창 */}
                  <div className="bg-[#0B132B] text-slate-100 p-8 rounded-3xl shadow-xl min-h-[520px] flex flex-col justify-between relative overflow-hidden border border-slate-800">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-orange-500/10 rounded-full filter blur-3xl"></div>
                    
                    {/* 접수 완료 상태에 따른 화면 구성 */}
                    {isSubmitted ? (
                      <div className="flex-1 flex flex-col items-center justify-center text-center py-10 z-10">
                        <div className="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center mb-6 border border-emerald-500/20 animate-bounce">
                          <Icon name="check-circle-2" className="w-10 h-10" />
                        </div>
                        <h4 className="text-2xl font-black text-white mb-3">정밀진단 신청 완료</h4>
                        <p className="text-base text-orange-300 font-bold mb-6">
                          성공적으로 신청이 접수되었습니다
                        </p>
                        <div className="bg-slate-950/60 p-5 rounded-2xl border border-slate-800 text-sm leading-relaxed max-w-sm text-slate-300">
                          <p className="mb-2 font-medium text-white">향후 진행 일정 안내</p>
                          1일 이내에 기재해 주신 <span className="text-orange-400 font-semibold">이메일</span> 및 저희 <span className="text-orange-400 font-semibold">전문 담당자가 직접 전화를 드려</span> 플레이스 현황 및 상세 노출 진단 내용에 대해 꼼꼼히 설명해 드립니다.
                        </div>
                        <button 
                          onClick={() => setIsSubmitted(false)}
                          className="mt-8 text-xs text-slate-500 hover:text-slate-300 underline"
                        >
                          다른 매장 추가 신청하기
                        </button>
                      </div>
                    ) : (
                      <div>
                        {/* 카드 헤더 */}
                        <div className="flex items-center justify-between pb-4 border-b border-slate-800 mb-6">
                          <div className="flex items-center space-x-2">
                            <span className="w-3 h-3 rounded-full bg-red-500"></span>
                            <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                            <span className="w-3 h-3 rounded-full bg-green-500"></span>
                          </div>
                          <span className="text-xs text-orange-400 font-bold tracking-widest uppercase text-serif">Gumiho Analytical Report</span>
                        </div>

                        <div className="space-y-6 leading-relaxed text-slate-300">
                          {/* 마크다운 스타일 수동 가공 및 파싱 */}
                          {reportResult.split('\n').map((line, index) => {
                            if (line.trim().startsWith('###') || line.trim().startsWith('**')) {
                              // 사용자 기억 준수: 특수 기호 제거 필터링
                              const cleanTitle = line.replace(/[#*]/g, '').trim();
                              return <h4 key={index} className="text-lg font-bold text-white mt-6 mb-2">{cleanTitle}</h4>;
                            } else if (line.trim().startsWith('1.') || line.trim().startsWith('2.') || line.trim().startsWith('3.') || line.trim().startsWith('4.')) {
                              return <p key={index} className="text-sm text-orange-200 font-semibold pl-2 py-1 bg-slate-900/60 rounded border-l-2 border-orange-500 my-2">{line}</p>;
                            } else if (line.trim()) {
                              return <p key={index} className="text-sm font-light text-slate-300 mb-2">{line}</p>;
                            }
                            return null;
                          })}
                        </div>
                      </div>
                    )}

                    <div className="mt-8 pt-4 border-t border-slate-800 flex flex-col sm:flex-row items-center justify-between text-xs text-slate-500 space-y-2 sm:space-y-0">
                      <span>발급 기관: 줄서는 구미호 로컬 사업본부</span>
                      <button 
                        onClick={() => {
                          document.execCommand('copy'); 
                          showModal("리포트 텍스트가 클립보드에 무사히 복사되었습니다.");
                        }}
                        className="text-orange-400 hover:text-orange-300 flex items-center space-x-1"
                      >
                        <Icon name="copy" className="w-3 h-3" />
                        <span>진단서 텍스트 복사하기</span>
                      </button>
                    </div>
                  </div>

                </div>

              </div>
            </div>
          </section>

          {/* 4. 핵심 가치 그리드 섹션 */}
          <section id="values" className="py-20 px-4 bg-white border-t border-slate-100">
            <div className="max-w-5xl mx-auto">
              <div className="text-center mb-16">
                <span className="text-[#F97316] font-bold text-sm tracking-wider uppercase">brand identity</span>
                <h2 className="text-3xl md:text-4xl font-bold text-[#0B132B] mt-2 mb-4">
                  줄서는 구미호가 추구하는 네 가지 핵심 가치
                </h2>
                <p className="text-slate-500">우리는 가짜 수치가 아닌 사장님의 실제 성장을 지향합니다</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                {/* 가치 1 */}
                <div className="bg-[#FAF9F6] p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between">
                  <div>
                    <div className="bg-white w-12 h-12 rounded-xl flex items-center justify-center mb-6 shadow-sm">
                      <Icon name="users" className="w-6 h-6 text-[#F97316]" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-3">사람을 모으는 콘텐츠</h3>
                    <p className="text-sm text-slate-500 leading-relaxed">
                      모니터 속 단순한 노출수나 가짜 조회수보다 중요한 것은 매장에 활기를 더하고 발걸음을 옮기게 만드는 진짜 행동력입니다. 저희는 실제 손길이 닿고 자발적 공유를 유발하는 콘텐츠를 지향합니다.
                    </p>
                  </div>
                  <div className="mt-6 pt-4 border-t border-slate-200/50 text-xs text-orange-600 font-bold">
                    진짜트래픽 실제내방수상승 바이럴마케팅
                  </div>
                </div>

                {/* 가치 2 */}
                <div className="bg-[#FAF9F6] p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between">
                  <div>
                    <div className="bg-white w-12 h-12 rounded-xl flex items-center justify-center mb-6 shadow-sm">
                      <Icon name="map" className="w-6 h-6 text-[#F97316]" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-3">로컬 기반 공동 성장</h3>
                    <p className="text-sm text-slate-500 leading-relaxed">
                      남양주와 구리를 기반으로 하는 로컬 자영업자 및 소상공인과 함께 숨 쉬며 성장하는 상생 네트워크를 그립니다. 동네 구석구석 매력적인 식당, 아늑한 카페, 지역 축제 등을 발굴해 콘텐츠로 가치를 엮어냅니다.
                    </p>
                  </div>
                  <div className="mt-6 pt-4 border-t border-slate-200/50 text-xs text-orange-600 font-bold">
                    남양주마케팅 구리마케팅 소상공인협력
                  </div>
                </div>

                {/* 가치 3 */}
                <div className="bg-[#FAF9F6] p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between">
                  <div>
                    <div className="bg-white w-12 h-12 rounded-xl flex items-center justify-center mb-6 shadow-sm">
                      <Icon name="git-merge" className="w-6 h-6 text-[#F97316]" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-3">유기적 입소문 구조 설계</h3>
                    <p className="text-sm text-slate-500 leading-relaxed">
                      단편적인 광고 송출로 끝나지 않고 왜 사람들이 여기에 열광하고 퍼 나르는가에 집중합니다. 네이버 플레이스 순위 상승 노하우, 숏폼 알고리즘 연계, 맘카페 입소문망까지 톱니바퀴처럼 긴밀하게 맞춘 연동 시스템을 설계합니다.
                    </p>
                  </div>
                  <div className="mt-6 pt-4 border-t border-slate-200/50 text-xs text-orange-600 font-bold">
                    릴스알고리즘 네이버지도최적화 지역커뮤니티선점
                  </div>
                </div>

                {/* 가치 4 */}
                <div className="bg-[#FAF9F6] p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between">
                  <div>
                    <div className="bg-white w-12 h-12 rounded-xl flex items-center justify-center mb-6 shadow-sm">
                      <Icon name="heart" className="w-6 h-6 text-[#F97316]" />
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-3">함께 일어서는 마케터 문화</h3>
                    <p className="text-sm text-slate-500 leading-relaxed">
                      여성 공동 창업팀이자 유능한 지역 크리에이터들이 함께 협력하고 영감을 나누는 일자리를 일구어 갑니다. 한 사람의 일방적인 지도가 아니라 서로의 전문성을 키워주며 즐거운 협업 속에서 고성능의 콘텐츠 퀄리티를 구현합니다.
                    </p>
                  </div>
                  <div className="mt-6 pt-4 border-t border-slate-200/50 text-xs text-orange-600 font-bold">
                    크리에이티브크루 여성창업협회 공동체중심
                  </div>
                </div>

              </div>
            </div>
          </section>

          {/* 슬로건 배너 */}
          <section className="py-16 px-4 bg-[#0B132B] text-center text-white relative overflow-hidden">
            <div className="absolute -bottom-20 -left-20 w-80 h-80 bg-orange-600/10 rounded-full filter blur-3xl"></div>
            <h2 className="text-2xl md:text-3xl font-light italic tracking-wide text-orange-400 text-serif">
              줄서는 가게에는 다 그만한 이유가 있습니다
            </h2>
            <p className="text-slate-400 mt-3 text-sm md:text-base">
              동네 골목 한구석, 소외된 명품 점포들의 든든한 날개와 입이 되어 드립니다
            </p>
          </section>

          {/* 푸터 영역 */}
          <footer className="bg-[#0B132B] text-slate-400 py-16 px-4 border-t border-slate-800">
            <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-8 mb-12">
              
              {/* 로고 & 브랜딩 설명 및 공동창업진 소개 */}
              <div className="md:col-span-5 space-y-4">
                <div className="flex items-center space-x-3">
                  <Logo className="w-10 h-10" />
                  <span className="text-white text-lg font-black tracking-tight">줄서는 구미호</span>
                </div>
                <p className="text-xs text-slate-300 leading-relaxed max-w-sm">
                  줄서는 구미호는 사람과 공간, 그리고 지역의 이야기를 브랜딩으로 연결하는 구리·남양주 기반 로컬 콘텐츠 크루입니다.
                </p>
                <p className="text-xs text-slate-400 leading-relaxed max-w-sm">
                  지역의 숨은 가치를 발견하고 콘텐츠와 마케팅으로 정교하게 성장시키는 로컬 브랜딩 액티브 그룹으로 활동하고 있습니다.
                </p>
                <p className="text-xs text-slate-500 pt-2 border-t border-slate-800/60 font-medium">
                  공동창업진 김명희 · 김현주 · 한지영 · 송민정 · 양정원
                </p>
              </div>

              {/* 제공 프로그램 */}
              <div className="md:col-span-3 space-y-3">
                <h4 className="text-xs font-bold uppercase tracking-wider text-white">제공 프로그램</h4>
                <ul className="text-xs space-y-2.5 text-slate-300">
                  <li><a href="#" className="hover:text-white transition-colors">네이버 플레이스 상위노출 최적화</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">인스타그램 릴스 숏폼 콘텐츠 제작</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">구리·남양주 지역 바이럴 마케팅 기획</a></li>
                  <li><a href="#" className="hover:text-white transition-colors">소상공인 맞춤 AI 브랜딩 컨설팅</a></li>
                </ul>
              </div>

              {/* 공동 파트너 얼라이언스 */}
              <div className="md:col-span-4 space-y-3">
                <h4 className="text-xs font-bold uppercase tracking-wider text-white">공동 파트너 얼라이언스</h4>
                <p className="text-xs leading-relaxed text-slate-300">
                  줄서는 구미호는 청년 창업자, 지역 소상공인, 로컬 브랜드와 함께 성장하는 구리·남양주 기반 로컬 브랜딩 네트워크입니다.
                </p>
                <p className="text-xs leading-relaxed text-slate-400">
                  지역 활성화와 상생을 목표로 다양한 민간·공공 프로젝트 및 로컬 콘텐츠 협업을 진행하고 있습니다.
                </p>
                <div className="flex flex-col sm:flex-row sm:space-x-2 space-y-2 sm:space-y-0 pt-2">
                  <button className="bg-white/5 border border-white/10 px-3 py-1.5 rounded text-[10px] text-slate-300 hover:bg-white/10 transition-colors">
                    구리·남양주 로컬 마케팅 연합
                  </button>
                  <button className="bg-white/5 border border-white/10 px-3 py-1.5 rounded text-[10px] text-slate-300 hover:bg-white/10 transition-colors">
                    구리·남양주 소상공인 네트워크
                  </button>
                </div>
              </div>

            </div>

            {/* 하단 저작권 정보 */}
            <div className="max-w-6xl mx-auto pt-8 border-t border-slate-800 flex flex-col sm:flex-row items-center justify-between text-xs text-slate-500">
              <p>&copy; 2026 LineUp Gumiho Inc. All rights reserved.</p>
              <div className="flex space-x-4 mt-4 sm:mt-0">
                <a href="#" className="hover:text-slate-300">이용약관</a>
                <a href="#" className="hover:text-slate-300">개인정보처리방침</a>
                <a href="#" className="hover:text-slate-300">고객상담센터</a>
              </div>
            </div>
          </footer>

          {/* 커스텀 얼럿 모달 창 */}
          {modalMessage && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white p-6 rounded-2xl max-w-sm w-full text-center space-y-4 shadow-2xl border border-orange-50">
                <div className="w-12 h-12 bg-orange-50 text-[#F97316] rounded-full flex items-center justify-center mx-auto">
                  <Icon name="info" className="w-6 h-6" />
                </div>
                <h4 className="text-base font-bold text-slate-800">줄서는 구미호 알림</h4>
                <p className="text-xs text-slate-500 leading-relaxed">{modalMessage}</p>
                <button 
                  onClick={() => setModalMessage(null)}
                  className="w-full bg-[#0B132B] hover:bg-slate-800 text-white font-bold py-2.5 rounded-xl text-xs transition-colors"
                >
                  확인 완료
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
